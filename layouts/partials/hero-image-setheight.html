<div id="hero" class="hero-image hero-image-setheight" {{ with .background }}{{ if fileExists (printf "static%s" .) }}style="background-image: linear-gradient(rgba(11,29,58,0.5), rgba(11,29,58,0.4)), url('{{ . | relURL }}'); background-size: cover; background-position: center;"{{ end }}{{ end }}>
  <div class="container">
    <div class="hero-text">
      <span class="hero-section">{{ .section }}</span>
      <h1>{{ .heading }}</h1>
      <p>{{ .subheading }}</p>
    </div>
  </div>
</div>
