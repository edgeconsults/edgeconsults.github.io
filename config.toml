  [params.homepage_meta_tags]
    meta_description = "EdgeConsults, LLC delivers end-to-end consulting in bioinformatics, AI/ML, cloud infrastructure, software engineering, grant writing, and technical training for research labs, ag-tech, and biotech companies."
    meta_og_title = "EdgeConsults, LLC: Bioinformatics, AI/ML & Research Infrastructure Consulting"
    meta_og_type = "website"
    meta_og_url = "https://edgeconsults.com"
    meta_og_image = "https://edgeconsults.com/images/edwin-solares.png"
    meta_og_description = "End-to-end consulting in bioinformatics, AI/ML, cloud infrastructure, software engineering, grant writing, and technical training for research labs, ag-tech, and biotech companies."
    meta_twitter_card = "summary"
    meta_twitter_site = ""
    meta_twitter_creator = ""

